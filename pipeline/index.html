<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LP投后汇报报告生成系统</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #F5F5F5;
  color: #333;
  min-height: 100vh;
}

/* Header */
.header {
  background: linear-gradient(135deg, #003D6B 0%, #0096A9 100%);
  padding: 32px 0;
  text-align: center;
  color: #fff;
}
.header h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 1px;
}
.header p {
  margin-top: 8px;
  font-size: 14px;
  opacity: 0.8;
  font-weight: 300;
}

/* Main */
.main {
  max-width: 820px;
  margin: 40px auto;
  padding: 0 20px;
}

/* Input Card */
.input-card {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  padding: 32px;
}
.input-card label {
  display: block;
  font-size: 15px;
  font-weight: 500;
  color: #003D6B;
  margin-bottom: 12px;
}
.input-card textarea {
  width: 100%;
  height: 100px;
  border: 1.5px solid #E0E0E0;
  border-radius: 8px;
  padding: 14px 16px;
  font-size: 15px;
  font-family: inherit;
  resize: vertical;
  transition: border-color 0.2s;
  line-height: 1.6;
}
.input-card textarea:focus {
  outline: none;
  border-color: #0096A9;
  box-shadow: 0 0 0 3px rgba(0,150,169,0.1);
}
.btn-generate {
  margin-top: 16px;
  width: 100%;
  height: 48px;
  background: linear-gradient(135deg, #0096A9 0%, #007A8A 100%);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.btn-generate:hover { opacity: 0.92; transform: translateY(-1px); }
.btn-generate:active { transform: translateY(0); }
.btn-generate:disabled {
  background: #B0BEC5;
  cursor: not-allowed;
  transform: none;
}

/* Progress Panel */
.progress-panel {
  display: none;
  margin-top: 24px;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  padding: 28px 32px;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* Progress Bar */
.progress-bar-wrap {
  background: #E8F4F6;
  border-radius: 6px;
  height: 8px;
  overflow: hidden;
  margin-bottom: 24px;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #0096A9, #00BCD4);
  border-radius: 6px;
  width: 0%;
  transition: width 0.6s ease;
}
.progress-text {
  text-align: right;
  font-size: 13px;
  color: #0096A9;
  font-weight: 500;
  margin-bottom: 6px;
}

/* Phases */
.phase-list { list-style: none; }
.phase-item {
  margin-bottom: 16px;
  opacity: 0.4;
  transition: opacity 0.3s;
}
.phase-item.active, .phase-item.done { opacity: 1; }
.phase-header {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 15px;
  font-weight: 500;
}
.phase-icon {
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.phase-item.active .phase-icon { animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
.phase-title { color: #003D6B; }
.phase-detail {
  margin-left: 32px;
  margin-top: 6px;
  font-size: 13px;
  color: #666;
  line-height: 1.8;
}
.phase-detail .step-line {
  display: flex;
  align-items: center;
  gap: 6px;
  animation: fadeIn 0.3s ease;
}
.source-tag {
  display: inline-block;
  background: #E8F4F6;
  color: #0096A9;
  font-size: 11px;
  padding: 1px 8px;
  border-radius: 10px;
  font-weight: 500;
  white-space: nowrap;
}
.phase-result {
  margin-left: 32px;
  margin-top: 6px;
  font-size: 13px;
  color: #0096A9;
  font-weight: 500;
}

/* Done Panel */
.done-panel {
  display: none;
  margin-top: 24px;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  padding: 28px 32px;
  text-align: center;
  animation: fadeIn 0.3s ease;
}
.done-panel h3 {
  font-size: 18px;
  color: #003D6B;
  margin-bottom: 6px;
}
.done-panel p {
  font-size: 14px;
  color: #666;
  margin-bottom: 20px;
}
.done-btns { display: flex; gap: 12px; justify-content: center; }
.btn-view, .btn-download {
  padding: 12px 28px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 500;
  text-decoration: none;
  cursor: pointer;
  font-family: inherit;
  border: none;
  transition: all 0.2s;
}
.btn-view {
  background: #0096A9;
  color: #fff;
}
.btn-view:hover { opacity: 0.9; }
.btn-download {
  background: #fff;
  color: #003D6B;
  border: 1.5px solid #003D6B;
}
.btn-download:hover { background: #F5F8FA; }

/* Footer */
.footer {
  text-align: center;
  padding: 40px 0 24px;
  font-size: 12px;
  color: #999;
}

/* Error */
.error-msg {
  display: none;
  margin-top: 12px;
  padding: 10px 16px;
  background: #FFF3F0;
  border: 1px solid #FFD6CC;
  border-radius: 8px;
  color: #D4380D;
  font-size: 13px;
}
</style>
</head>
<body>

<div class="header">
  <h1>LP投后汇报报告生成系统</h1>
  <p>AI Agent 自动搜索 + 数据分析 + 报告生成 + PDF输出</p>
</div>

<div class="main">
  <div class="input-card">
    <label for="prompt">请描述您的报告需求</label>
    <textarea id="prompt">请你生成一份给Limited Partner看的报告，包括：Cerebras核心信息、Cerebras在芯片行业及同行信息对比数据分析</textarea>
    <button class="btn-generate" id="btnGenerate" onclick="startGenerate()">开始生成报告</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="progress-panel" id="progressPanel">
    <div class="progress-text" id="progressText">0%</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar"></div>
    </div>
    <ul class="phase-list" id="phaseList">
      <li class="phase-item" id="phase-1">
        <div class="phase-header">
          <span class="phase-icon">⏳</span>
          <span class="phase-title">Phase 1 — 搜索公司数据</span>
        </div>
        <div class="phase-detail" id="detail-1"></div>
        <div class="phase-result" id="result-1"></div>
      </li>
      <li class="phase-item" id="phase-2">
        <div class="phase-header">
          <span class="phase-icon">⏳</span>
          <span class="phase-title">Phase 2 — 搜索行业数据</span>
        </div>
        <div class="phase-detail" id="detail-2"></div>
        <div class="phase-result" id="result-2"></div>
      </li>
      <li class="phase-item" id="phase-3">
        <div class="phase-header">
          <span class="phase-icon">⏳</span>
          <span class="phase-title">Phase 3 — LLM分析与结构化</span>
        </div>
        <div class="phase-detail" id="detail-3"></div>
        <div class="phase-result" id="result-3"></div>
      </li>
      <li class="phase-item" id="phase-4">
        <div class="phase-header">
          <span class="phase-icon">⏳</span>
          <span class="phase-title">Phase 4 — 生成报告文字</span>
        </div>
        <div class="phase-detail" id="detail-4"></div>
        <div class="phase-result" id="result-4"></div>
      </li>
      <li class="phase-item" id="phase-5">
        <div class="phase-header">
          <span class="phase-icon">⏳</span>
          <span class="phase-title">Phase 5 — 渲染图表与PDF</span>
        </div>
        <div class="phase-detail" id="detail-5"></div>
        <div class="phase-result" id="result-5"></div>
      </li>
    </ul>
  </div>

  <div class="done-panel" id="donePanel">
    <h3>报告生成完成</h3>
    <p>共7页，包含融资历程、行业分析、风险矩阵、投资结论等完整内容</p>
    <div class="done-btns">
      <a class="btn-view" href="report" target="_blank">查看报告</a>
      <a class="btn-download" href="api/download-pdf">下载PDF</a>
    </div>
  </div>
</div>

<div class="footer">LP Report Generator &copy; 2026 &mdash; Powered by AI Agent Workflow</div>

<script>
let evtSource = null;

function startGenerate() {
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) {
    showError('请输入报告需求描述');
    return;
  }

  // Reset UI
  const btn = document.getElementById('btnGenerate');
  btn.disabled = true;
  btn.textContent = '生成中...';
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('donePanel').style.display = 'none';
  document.getElementById('progressPanel').style.display = 'block';
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('progressText').textContent = '0%';

  // Reset all phases
  for (let i = 1; i <= 5; i++) {
    const el = document.getElementById('phase-' + i);
    el.className = 'phase-item';
    el.querySelector('.phase-icon').textContent = '⏳';
    document.getElementById('detail-' + i).innerHTML = '';
    document.getElementById('result-' + i).textContent = '';
  }

  // Start SSE
  const url = 'api/generate-stream?prompt=' + encodeURIComponent(prompt);
  evtSource = new EventSource(url);

  evtSource.onmessage = function(e) {
    const data = JSON.parse(e.data);

    if (data.phase === 'done') {
      // All done
      evtSource.close();
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = '100%';
      document.getElementById('donePanel').style.display = 'block';
      btn.disabled = false;
      btn.textContent = '重新生成';
      return;
    }

    if (data.phase === 'error') {
      evtSource.close();
      showError(data.detail || '生成失败');
      btn.disabled = false;
      btn.textContent = '开始生成报告';
      return;
    }

    const phase = data.phase;
    const phaseEl = document.getElementById('phase-' + phase);
    const detailEl = document.getElementById('detail-' + phase);
    const resultEl = document.getElementById('result-' + phase);

    // Update progress bar
    document.getElementById('progressBar').style.width = data.progress + '%';
    document.getElementById('progressText').textContent = data.progress + '%';

    if (data.step === 'start') {
      // Phase starts
      phaseEl.className = 'phase-item active';
      phaseEl.querySelector('.phase-icon').textContent = '⏳';
    } else if (data.step === 'searching' || data.step === 'analyzing' || data.step === 'generating' || data.step === 'rendering') {
      // Sub-step
      phaseEl.className = 'phase-item active';
      const line = document.createElement('div');
      line.className = 'step-line';
      const sourceHtml = data.source ? '<span class="source-tag">' + data.source + '</span>' : '';
      line.innerHTML = sourceHtml + ' ' + data.detail;
      detailEl.appendChild(line);
    } else if (data.step === 'done') {
      // Phase done
      phaseEl.className = 'phase-item done';
      phaseEl.querySelector('.phase-icon').textContent = '✅';
      if (data.detail) {
        resultEl.textContent = data.detail;
      }
    }
  };

  evtSource.onerror = function() {
    evtSource.close();
    btn.disabled = false;
    btn.textContent = '开始生成报告';
  };
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
